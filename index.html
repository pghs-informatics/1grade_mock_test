<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성적 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5fb;
    --surface: #ffffff;
    --surface2: #eef0fa;
    --border: #dde0f0;
    --accent: #5b52e8;
    --accent2: #f04a70;
    --accent3: #18b85c;
    --text: #1a1a2e;
    --text-muted: #8888aa;
    --kor: #5b52e8;
    --math: #f04a70;
    --eng: #18b85c;
    --grade1: #f5a623;
    --grade2: #9b9bbb;
    --grade3: #cd7f32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,82,232,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,82,232,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .badge {
    display: inline-block;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.4);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #1a1a2e 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 300;
  }

  /* Search box */
  .search-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 32px;
    box-shadow: 0 2px 16px rgba(91,82,232,0.07);
  }

  .input-group {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .input-wrap::before {
    content: '학번';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 18px 20px 18px 64px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }

  input[type="text"]::placeholder {
    color: var(--border);
    letter-spacing: 2px;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 18px 28px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { background: #5a52e0; }
  .btn:active { transform: scale(0.97); }

  .hint {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .hint span { cursor: pointer; transition: color 0.2s; }
  .hint span:hover { color: var(--accent); }

  /* Result card */
  #result { display: none; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .student-id {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 2px;
  }

  .student-name {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }

  .total-grade {
    margin-left: auto;
    text-align: right;
  }

  .total-grade .label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    font-family: 'Space Mono', monospace;
  }

  .total-grade .value {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  /* Score cards */
  .score-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
    box-shadow: 0 2px 12px rgba(91,82,232,0.06);
  }

  .score-card:hover { transform: translateY(-2px); }

  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .score-card.kor::before { background: var(--kor); }
  .score-card.math::before { background: var(--math); }
  .score-card.eng::before { background: var(--eng); }

  .card-subject {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .score-card.kor .card-subject { color: var(--kor); }
  .score-card.math .card-subject { color: var(--math); }
  .score-card.eng .card-subject { color: var(--eng); }

  .card-score {
    font-family: 'Space Mono', monospace;
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }

  .card-grade-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .grade-badge {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .score-card.kor .grade-badge { background: rgba(108,99,255,0.2); color: var(--kor); }
  .score-card.math .grade-badge { background: rgba(255,101,132,0.2); color: var(--math); }
  .score-card.eng .grade-badge { background: rgba(67,233,123,0.2); color: var(--eng); }

  .grade-text { font-size: 12px; color: var(--text-muted); }

  /* Chart */
  .chart-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 24px 20px;
    box-shadow: 0 2px 12px rgba(91,82,232,0.06);
  }

  .chart-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 20px;
  }

  .chart-area {
    position: relative;
    height: 180px;
    display: flex;
    align-items: flex-end;
    gap: 0;
  }

  .chart-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .grid-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: var(--border);
    opacity: 0.5;
  }

  .grid-label {
    position: absolute;
    right: calc(100% + 8px);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    transform: translateY(50%);
  }

  .bars-wrap {
    display: flex;
    align-items: flex-end;
    gap: 24px;
    width: 100%;
    padding-left: 32px;
    height: 100%;
  }

  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar-wrapper {
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: calc(100% - 32px);
  }

  .bar {
    width: 70%;
    max-width: 80px;
    border-radius: 6px 6px 0 0;
    position: relative;
    transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
  }

  .bar.kor { background: linear-gradient(180deg, var(--kor), rgba(108,99,255,0.5)); }
  .bar.math { background: linear-gradient(180deg, var(--math), rgba(255,101,132,0.5)); }
  .bar.eng { background: linear-gradient(180deg, var(--eng), rgba(67,233,123,0.5)); }

  .bar-val {
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }

  .bar-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* Radar / polygon chart */
  .radar-wrap {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  svg.radar { overflow: visible; }

  /* Error */
  #error-msg {
    display: none;
    background: rgba(255,101,132,0.1);
    border: 1px solid rgba(255,101,132,0.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: var(--accent2);
    font-size: 14px;
    text-align: center;
    animation: fadeUp 0.3s ease;
  }

  .no-score {
    font-family: 'Space Mono', monospace;
    font-size: 40px;
    color: var(--text-muted);
  }

  @media (max-width: 500px) {
    .score-cards { grid-template-columns: 1fr; }
    .result-header { flex-wrap: wrap; }
    .total-grade { margin-left: 0; }
    .input-group { flex-direction: column; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">포항여자고등학교</div>
    <h1>성적 조회 시스템</h1>
    <p class="subtitle">학번을 입력하면 국어 · 수학 · 영어 성적과 등급을 확인할 수 있습니다</p>
  </header>

  <div class="search-area">
    <div class="input-group">
      <div class="input-wrap">
        <input type="text" id="idInput" placeholder="00000" maxlength="5"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')"
               onkeydown="if(event.key==='Enter')lookup()">
      </div>
      <button class="btn" onclick="lookup()">조회하기</button>
    </div>

  </div>

  <div id="error-msg">❌ 해당 학번을 찾을 수 없습니다. 학번을 다시 확인해 주세요.</div>

  <div id="result">
    <div class="result-header">
      <div>
        <div class="student-id" id="res-id"></div>
        <div class="student-name" id="res-name"></div>
      </div>
      <div class="total-grade">
        <div class="label">합산 등급</div>
        <div class="value" id="res-total"></div>
      </div>
    </div>

    <div class="score-cards">
      <div class="score-card kor">
        <div class="card-subject">국어</div>
        <div class="card-score" id="kor-score"></div>
        <div class="card-grade-row">
          <div class="grade-badge" id="kor-grade"></div>
          <div class="grade-text" id="kor-grade-text"></div>
        </div>
      </div>
      <div class="score-card math">
        <div class="card-subject">수학</div>
        <div class="card-score" id="math-score"></div>
        <div class="card-grade-row">
          <div class="grade-badge" id="math-grade"></div>
          <div class="grade-text" id="math-grade-text"></div>
        </div>
      </div>
      <div class="score-card eng">
        <div class="card-subject">영어</div>
        <div class="card-score" id="eng-score"></div>
        <div class="card-grade-row">
          <div class="grade-badge" id="eng-grade"></div>
          <div class="grade-text" id="eng-grade-text"></div>
        </div>
      </div>
    </div>

    <div class="chart-box">
      <div class="chart-title">SCORE VISUALIZATION</div>
      <div class="chart-area">
        <div class="chart-grid" id="chartGrid"></div>
        <div class="bars-wrap">
          <div class="bar-group">
            <div class="bar-wrapper">
              <div class="bar kor" id="bar-kor" style="height:0%">
                <div class="bar-val" id="barval-kor" style="color:var(--kor)"></div>
              </div>
            </div>
            <div class="bar-label" style="color:var(--kor)">국어</div>
          </div>
          <div class="bar-group">
            <div class="bar-wrapper">
              <div class="bar math" id="bar-math" style="height:0%">
                <div class="bar-val" id="barval-math" style="color:var(--math)"></div>
              </div>
            </div>
            <div class="bar-label" style="color:var(--math)">수학</div>
          </div>
          <div class="bar-group">
            <div class="bar-wrapper">
              <div class="bar eng" id="bar-eng" style="height:0%">
                <div class="bar-val" id="barval-eng" style="color:var(--eng)"></div>
              </div>
            </div>
            <div class="bar-label" style="color:var(--eng)">영어</div>
          </div>
        </div>
      </div>

      <!-- Radar -->
      <div class="radar-wrap">
        <svg class="radar" id="radarSvg" width="240" height="200" viewBox="-120 -100 240 200"></svg>
      </div>
    </div>
  </div>

</div>

const gradeLabels = {1:'1등급',2:'2등급',3:'3등급',4:'4등급',5:'5등급',6:'6등급',7:'7등급',8:'8등급',9:'9등급'};

function fillSample(id) {
  document.getElementById('idInput').value = id;
  lookup();
}

function lookup() {
  const q = document.getElementById('idInput').value.trim();
  const errEl = document.getElementById('error-msg');
  const resEl = document.getElementById('result');
  errEl.style.display = 'none';
  resEl.style.display = 'none';

  if (!q) return;

  const row = data.find(r => String(r[0]) === q);
  if (!row) {
    errEl.style.display = 'block';
    return;
  }

  const [id, name, korScore, korGrade, mathScore, mathGrade, engScore, engGrade, total] = row;

  document.getElementById('res-id').textContent = id;
  document.getElementById('res-name').textContent = name;
  document.getElementById('res-total').textContent = total;

  // Scores
  setCard('kor', korScore, korGrade);
  setCard('math', mathScore, mathGrade);
  setCard('eng', engScore, engGrade);

  // Bars
  drawBars(korScore, mathScore, engScore);

  // Radar
  drawRadar(korScore, mathScore, engScore);

  resEl.style.display = 'block';
}

function setCard(sub, score, grade) {
  const scoreEl = document.getElementById(`${sub}-score`);
  const gradeEl = document.getElementById(`${sub}-grade`);
  const gradeTextEl = document.getElementById(`${sub}-grade-text`);

  if (score === null) {
    scoreEl.innerHTML = '<span class="no-score">—</span>';
    gradeEl.textContent = '미응시';
    gradeTextEl.textContent = '';
  } else {
    scoreEl.textContent = score;
    gradeEl.textContent = grade + '등급';
    gradeTextEl.textContent = gradeLabels[grade] || '';
  }
}

function drawBars(kor, math, eng) {
  const max = 100;
  const scores = [kor ?? 0, math ?? 0, eng ?? 0];
  const ids = ['kor', 'math', 'eng'];
  const vals = [kor, math, eng];

  // Grid lines
  const grid = document.getElementById('chartGrid');
  grid.innerHTML = '';
  [0, 25, 50, 75, 100].forEach(v => {
    const pct = v / max * 100;
    const line = document.createElement('div');
    line.className = 'grid-line';
    line.style.bottom = pct + '%';
    const label = document.createElement('div');
    label.className = 'grid-label';
    label.style.bottom = pct + '%';
    label.textContent = v;
    grid.appendChild(line);
    grid.appendChild(label);
  });

  ids.forEach((id, i) => {
    const bar = document.getElementById(`bar-${id}`);
    const valEl = document.getElementById(`barval-${id}`);
    const pct = (scores[i] / max) * 100;
    setTimeout(() => {
      bar.style.height = pct + '%';
    }, 50);
    valEl.textContent = vals[i] !== null ? vals[i] : '—';
  });
}

function drawRadar(kor, math, eng) {
  const svg = document.getElementById('radarSvg');
  svg.innerHTML = '';
  const R = 80;
  const cx = 0, cy = 0;
  const labels = ['국어', '수학', '영어'];
  const scores = [kor ?? 0, math ?? 0, eng ?? 0];
  const colors = ['var(--kor)', 'var(--math)', 'var(--eng)'];
  const angles = [-90, 30, 150]; // degrees for 3 axes

  function toXY(angle, r) {
    const rad = angle * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }

  // Background rings
  [25, 50, 75, 100].forEach(v => {
    const r = (v / 100) * R;
    const pts = angles.map(a => toXY(a, r).join(',')).join(' ');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', 'var(--border)');
    poly.setAttribute('stroke-width', '1');
    svg.appendChild(poly);
  });

  // Axes
  angles.forEach((a, i) => {
    const [x2, y2] = toXY(a, R);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', 'var(--border)'); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);

    // Label
    const [lx, ly] = toXY(a, R + 18);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', lx); text.setAttribute('y', ly);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'central');
    text.setAttribute('font-size', '12');
    text.setAttribute('fill', colors[i]);
    text.setAttribute('font-family', 'Noto Sans KR, sans-serif');
    text.setAttribute('font-weight', '700');
    text.textContent = labels[i];
    svg.appendChild(text);
  });

  // Data polygon
  const pts = angles.map((a, i) => toXY(a, (scores[i] / 100) * R).join(',')).join(' ');
  const fill = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  fill.setAttribute('points', pts);
  fill.setAttribute('fill', 'rgba(108,99,255,0.15)');
  fill.setAttribute('stroke', 'var(--accent)');
  fill.setAttribute('stroke-width', '2');
  svg.appendChild(fill);

  // Dots
  angles.forEach((a, i) => {
    const [x, y] = toXY(a, (scores[i] / 100) * R);
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', x); circle.setAttribute('cy', y); circle.setAttribute('r', 5);
    circle.setAttribute('fill', colors[i]);
    svg.appendChild(circle);
  });
}
