<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성적 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f4f5fb;
    --surface: #ffffff;
    --surface2: #eef0fa;
    --border: #dde0f0;
    --accent: #5b52e8;
    --text: #1a1a2e;
    --text-muted: #8888aa;
    --kor: #5b52e8;
    --math: #f04a70;
    --eng: #18b85c;
    --total: #f5a623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(91,82,232,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,82,232,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 1;
    max-width: 960px; margin: 0 auto;
    padding: 40px 24px 80px;
  }
  header { text-align: center; margin-bottom: 32px; }
  .badge {
    display: inline-block;
    background: rgba(91,82,232,0.1);
    border: 1px solid rgba(91,82,232,0.3);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    padding: 6px 16px; border-radius: 2px; margin-bottom: 14px;
  }
  h1 {
    font-size: clamp(26px, 5vw, 44px); font-weight: 900;
    letter-spacing: -1px; line-height: 1.1;
    background: linear-gradient(135deg, #1a1a2e 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 6px;
  }
  .subtitle { color: var(--text-muted); font-size: 14px; font-weight: 300; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 6px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px rgba(91,82,232,0.06);
  }
  .tab {
    flex: 1; text-align: center;
    padding: 12px 8px; border-radius: 8px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; color: var(--text-muted);
    transition: all 0.2s; user-select: none;
  }
  .tab:hover { color: var(--accent); background: var(--surface2); }
  .tab.active { background: var(--accent); color: #fff; }

  /* Panels */
  .panel { display: none; animation: fadeUp 0.3s ease; }
  .panel.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Search */
  .search-area {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; margin-bottom: 24px;
    box-shadow: 0 2px 16px rgba(91,82,232,0.07);
  }
  .input-group { display: flex; gap: 12px; align-items: center; }
  .input-wrap { flex: 1; position: relative; }
  .input-wrap::before {
    content: '학번'; position: absolute; left: 16px; top: 50%;
    transform: translateY(-50%);
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--text-muted); letter-spacing: 1px; pointer-events: none;
  }
  input[type="text"] {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700; letter-spacing: 4px;
    padding: 18px 20px 18px 64px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,82,232,0.12);
  }
  input[type="text"]::placeholder { color: var(--border); letter-spacing: 2px; }
  .btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 18px 28px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { background: #4a43cc; }
  .btn:active { transform: scale(0.97); }

  #error-msg {
    display: none;
    background: rgba(240,74,112,0.08);
    border: 1px solid rgba(240,74,112,0.25);
    border-radius: 8px; padding: 14px 20px;
    color: var(--math); font-size: 14px; text-align: center;
    margin-bottom: 16px; animation: fadeUp 0.3s ease;
  }

  #result { display: none; animation: fadeUp 0.4s ease; }
  .result-header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 22px; flex-wrap: wrap;
  }
  .student-id {
    font-family: 'Space Mono', monospace; font-size: 13px;
    color: var(--text-muted); letter-spacing: 2px;
  }
  .student-name { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
  .total-grade { margin-left: auto; text-align: right; }
  .total-grade .label {
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 2px; font-family: 'Space Mono', monospace;
  }
  .total-grade .value {
    font-family: 'Space Mono', monospace; font-size: 36px;
    font-weight: 700; color: var(--accent); line-height: 1;
  }

  .score-cards {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-bottom: 22px;
  }
  .score-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; position: relative;
    overflow: hidden; transition: transform 0.2s;
    box-shadow: 0 2px 12px rgba(91,82,232,0.06);
  }
  .score-card:hover { transform: translateY(-2px); }
  .score-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }
  .score-card.kor::before { background: var(--kor); }
  .score-card.math::before { background: var(--math); }
  .score-card.eng::before { background: var(--eng); }
  .card-subject { font-size: 12px; font-weight: 700; letter-spacing: 2px; margin-bottom: 12px; }
  .score-card.kor .card-subject { color: var(--kor); }
  .score-card.math .card-subject { color: var(--math); }
  .score-card.eng .card-subject { color: var(--eng); }
  .card-score {
    font-family: 'Space Mono', monospace; font-size: 40px;
    font-weight: 700; line-height: 1; margin-bottom: 8px;
  }
  .card-grade-row { display: flex; align-items: center; gap: 8px; }
  .grade-badge {
    font-family: 'Space Mono', monospace; font-size: 12px;
    font-weight: 700; padding: 4px 10px; border-radius: 4px; letter-spacing: 1px;
  }
  .score-card.kor .grade-badge { background: rgba(91,82,232,0.1); color: var(--kor); }
  .score-card.math .grade-badge { background: rgba(240,74,112,0.1); color: var(--math); }
  .score-card.eng .grade-badge { background: rgba(24,184,92,0.1); color: var(--eng); }

  .chart-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px;
    box-shadow: 0 2px 12px rgba(91,82,232,0.06);
  }
  .chart-title {
    font-size: 11px; letter-spacing: 2px; color: var(--text-muted);
    font-family: 'Space Mono', monospace; margin-bottom: 18px;
  }
  .chart-area { position: relative; height: 155px; display: flex; align-items: flex-end; }
  .chart-grid { position: absolute; inset: 0; pointer-events: none; }
  .grid-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--border); opacity: 0.6; }
  .grid-label {
    position: absolute; right: calc(100% + 6px);
    font-family: 'Space Mono', monospace; font-size: 9px;
    color: var(--text-muted); transform: translateY(50%);
  }
  .bars-wrap {
    display: flex; align-items: flex-end; gap: 24px;
    width: 100%; padding-left: 28px; height: 100%;
  }
  .bar-group {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 8px; height: 100%; justify-content: flex-end;
  }
  .bar-wrapper {
    width: 100%; display: flex; align-items: flex-end;
    justify-content: center; height: calc(100% - 28px);
  }
  .bar {
    width: 60%; max-width: 72px; border-radius: 6px 6px 0 0;
    position: relative; transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .bar.kor { background: linear-gradient(180deg, var(--kor), rgba(91,82,232,0.25)); }
  .bar.math { background: linear-gradient(180deg, var(--math), rgba(240,74,112,0.25)); }
  .bar.eng { background: linear-gradient(180deg, var(--eng), rgba(24,184,92,0.25)); }
  .bar-val {
    position: absolute; top: -21px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace; font-size: 12px;
    font-weight: 700; white-space: nowrap;
  }
  .bar-label { font-size: 12px; font-weight: 700; }
  .radar-wrap { margin-top: 18px; display: flex; justify-content: center; }
  svg.radar { overflow: visible; }
  .no-score { font-family: 'Space Mono', monospace; font-size: 40px; color: var(--text-muted); }

  /* Chart panels */
  .panel-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px;
    box-shadow: 0 2px 16px rgba(91,82,232,0.07);
  }
  .panel-title { font-size: 17px; font-weight: 900; margin-bottom: 4px; }
  .panel-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; }
  .line-chart-wrap { position: relative; width: 100%; height: 320px; }

  /* 반별 */
  .cls-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .cls-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 9px 20px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; color: var(--text-muted); transition: all 0.18s;
  }
  .cls-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cls-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .cls-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .stat-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 16px; font-size: 13px; color: var(--text-muted);
  }
  .stat-chip strong { color: var(--text); font-weight: 700; }

  @media (max-width: 520px) {
    .score-cards { grid-template-columns: 1fr; }
    .input-group { flex-direction: column; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">포항여자고등학교</div>
    <h1>성적 조회 시스템</h1>
    <p class="subtitle">국어 · 수학 · 영어 성적 및 등급 분석</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('lookup')">🔍 학번 조회</div>
    <div class="tab" onclick="switchTab('top20')">🏆 상위 20명</div>
    <div class="tab" onclick="switchTab('cls')">📊 반별 조회</div>
  </div>

  <!-- Panel 1 -->
  <div class="panel active" id="panel-lookup">
    <div class="search-area">
      <div class="input-group">
        <div class="input-wrap">
          <input type="text" id="idInput" placeholder="00000" maxlength="5"
                 oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                 onkeydown="if(event.key==='Enter')lookup()">
        </div>
        <button class="btn" onclick="lookup()">조회하기</button>
      </div>
    </div>
    <div id="error-msg">❌ 해당 학번을 찾을 수 없습니다. 학번을 다시 확인해 주세요.</div>
    <div id="result">
      <div class="result-header">
        <div>
          <div class="student-id" id="res-id"></div>
          <div class="student-name" id="res-name"></div>
        </div>
        <div class="total-grade">
          <div class="label">합산 등급</div>
          <div class="value" id="res-total"></div>
        </div>
      </div>
      <div class="score-cards">
        <div class="score-card kor">
          <div class="card-subject">국어</div>
          <div class="card-score" id="kor-score"></div>
          <div class="card-grade-row">
            <div class="grade-badge" id="kor-grade"></div>
          </div>
        </div>
        <div class="score-card math">
          <div class="card-subject">수학</div>
          <div class="card-score" id="math-score"></div>
          <div class="card-grade-row">
            <div class="grade-badge" id="math-grade"></div>
          </div>
        </div>
        <div class="score-card eng">
          <div class="card-subject">영어</div>
          <div class="card-score" id="eng-score"></div>
          <div class="card-grade-row">
            <div class="grade-badge" id="eng-grade"></div>
          </div>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-title">SCORE VISUALIZATION</div>
        <div class="chart-area">
          <div class="chart-grid" id="chartGrid"></div>
          <div class="bars-wrap">
            <div class="bar-group">
              <div class="bar-wrapper">
                <div class="bar kor" id="bar-kor" style="height:0%">
                  <div class="bar-val" id="barval-kor" style="color:var(--kor)"></div>
                </div>
              </div>
              <div class="bar-label" style="color:var(--kor)">국어</div>
            </div>
            <div class="bar-group">
              <div class="bar-wrapper">
                <div class="bar math" id="bar-math" style="height:0%">
                  <div class="bar-val" id="barval-math" style="color:var(--math)"></div>
                </div>
              </div>
              <div class="bar-label" style="color:var(--math)">수학</div>
            </div>
            <div class="bar-group">
              <div class="bar-wrapper">
                <div class="bar eng" id="bar-eng" style="height:0%">
                  <div class="bar-val" id="barval-eng" style="color:var(--eng)"></div>
                </div>
              </div>
              <div class="bar-label" style="color:var(--eng)">영어</div>
            </div>
          </div>
        </div>
        <div class="radar-wrap">
          <svg class="radar" id="radarSvg" width="240" height="200" viewBox="-120 -100 240 200"></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Panel 2 -->
  <div class="panel" id="panel-top20">
    <div class="panel-box">
      <div class="panel-title">🏆 상위 20명 성적 현황</div>
      <div class="panel-sub">국어+수학+영어 총점 기준 상위 20명의 과목별 점수 비교</div>
      <div class="line-chart-wrap">
        <canvas id="top20Chart"></canvas>
      </div>
    </div>
  </div>

  <!-- Panel 3 -->
  <div class="panel" id="panel-cls">
    <div class="panel-box">
      <div class="panel-title">📊 반별 성적 조회</div>
      <div class="panel-sub">반을 선택하면 해당 반 학생들의 국영수 점수를 확인합니다</div>
      <div class="cls-selector" id="clsSelector"></div>
      <div class="cls-stats" id="clsStats"></div>
      <div class="line-chart-wrap">
        <canvas id="clsChart"></canvas>
      </div>
    </div>
  </div>
</div>

/* ── Tab ── */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['lookup','top20','cls'][i]===tab);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='top20') setTimeout(buildTop20, 50);
  if(tab==='cls') setTimeout(buildClsPanel, 50);
}

/* ── Panel 1 ── */
function lookup(){
  const q=document.getElementById('idInput').value.trim();
  const err=document.getElementById('error-msg');
  const res=document.getElementById('result');
  err.style.display='none'; res.style.display='none';
  if(!q) return;
  const row=data.find(d=>String(d.id)===q);
  if(!row){err.style.display='block';return;}
  document.getElementById('res-id').textContent=row.id;
  document.getElementById('res-name').textContent=row.name;
  document.getElementById('res-total').textContent=row.totalGrade;
  setCard('kor',row.kor,row.korGrade);
  setCard('math',row.math,row.mathGrade);
  setCard('eng',row.eng,row.engGrade);
  drawBars(row.kor,row.math,row.eng);
  drawRadar(row.kor,row.math,row.eng);
  res.style.display='block';
}
function setCard(sub,score,grade){
  const se=document.getElementById(sub+'-score');
  const ge=document.getElementById(sub+'-grade');
  if(score===null){se.innerHTML='<span class="no-score">—</span>';ge.textContent='미응시';}
  else{se.textContent=score;ge.textContent=grade+'등급';}
}
function drawBars(kor,math,eng){
  const grid=document.getElementById('chartGrid');
  grid.innerHTML='';
  [0,25,50,75,100].forEach(v=>{
    const pct=v+'%';
    const l=document.createElement('div');l.className='grid-line';l.style.bottom=pct;
    const lb=document.createElement('div');lb.className='grid-label';lb.style.bottom=pct;lb.textContent=v;
    grid.appendChild(l);grid.appendChild(lb);
  });
  [['kor',kor],['math',math],['eng',eng]].forEach(([id,val])=>{
    setTimeout(()=>{document.getElementById('bar-'+id).style.height=((val??0)/100*100)+'%';},50);
    document.getElementById('barval-'+id).textContent=val!==null?val:'—';
  });
}
function drawRadar(kor,math,eng){
  const svg=document.getElementById('radarSvg');svg.innerHTML='';
  const R=80,scores=[kor??0,math??0,eng??0];
  const colors=['var(--kor)','var(--math)','var(--eng)'];
  const labels=['국어','수학','영어'],angles=[-90,30,150];
  const xy=(a,r)=>{const rad=a*Math.PI/180;return[r*Math.cos(rad),r*Math.sin(rad)];};
  const ns='http://www.w3.org/2000/svg';
  [25,50,75,100].forEach(v=>{
    const r=v/100*R,pts=angles.map(a=>xy(a,r).join(',')).join(' ');
    const p=document.createElementNS(ns,'polygon');
    p.setAttribute('points',pts);p.setAttribute('fill','none');
    p.setAttribute('stroke','var(--border)');p.setAttribute('stroke-width','1');svg.appendChild(p);
  });
  angles.forEach((a,i)=>{
    const [x2,y2]=xy(a,R);
    const l=document.createElementNS(ns,'line');
    l.setAttribute('x1',0);l.setAttribute('y1',0);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke','var(--border)');l.setAttribute('stroke-width','1');svg.appendChild(l);
    const [lx,ly]=xy(a,R+18);
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',lx);t.setAttribute('y',ly);t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','central');t.setAttribute('font-size','12');
    t.setAttribute('fill',colors[i]);t.setAttribute('font-family','Noto Sans KR, sans-serif');
    t.setAttribute('font-weight','700');t.textContent=labels[i];svg.appendChild(t);
  });
  const pts=angles.map((a,i)=>xy(a,(scores[i]/100)*R).join(',')).join(' ');
  const fill=document.createElementNS(ns,'polygon');
  fill.setAttribute('points',pts);fill.setAttribute('fill','rgba(91,82,232,0.1)');
  fill.setAttribute('stroke','var(--accent)');fill.setAttribute('stroke-width','2');svg.appendChild(fill);
  angles.forEach((a,i)=>{
    const [x,y]=xy(a,(scores[i]/100)*R);
    const c=document.createElementNS(ns,'circle');
    c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',5);
    c.setAttribute('fill',colors[i]);svg.appendChild(c);
  });
}

/* ── Panel 2: 상위 20명 ── */
function buildTop20(){
  if(top20Inst) return;
  const top=([...data].filter(d=>d.kor!==null).sort((a,b)=>b.total-a.total)).slice(0,20);
  const ctx=document.getElementById('top20Chart').getContext('2d');
  top20Inst=new Chart(ctx,{
    type:'line',
    data:{
      labels:top.map(d=>`${d.name} (${d.cls}반)`),
      datasets:[
        makeDS('총점',top.map(d=>d.total),'#f5a623','circle',2.5,true),
        makeDS('국어',top.map(d=>d.kor),'#5b52e8','triangle',2,false),
        makeDS('수학',top.map(d=>d.math),'#f04a70','star',2,false),
        makeDS('영어',top.map(d=>d.eng),'#18b85c','rectRot',2,false),
      ]
    },
    options:chartOpts(0,300,50,true)
  });
}

/* ── Panel 3: 반별 ── */
function buildClsPanel(){
  const classes=[...new Set(data.map(d=>d.cls))].sort();
  const sel=document.getElementById('clsSelector');
  if(sel.innerHTML) return;
  classes.forEach(cls=>{
    const btn=document.createElement('button');
    btn.className='cls-btn';btn.textContent=cls+'반';
    btn.dataset.cls=cls;btn.onclick=()=>selectCls(cls);sel.appendChild(btn);
  });
  setTimeout(()=>selectCls(classes[0]), 0);
}

function selectCls(cls){
  document.querySelectorAll('.cls-btn').forEach(b=>b.classList.toggle('active',b.dataset.cls===cls));
  const rows=data.filter(d=>d.cls===cls&&d.kor!==null);
  const avg=k=>(rows.reduce((s,r)=>s+(r[k]??0),0)/rows.length).toFixed(1);
  document.getElementById('clsStats').innerHTML=`
    <div class="stat-chip">👩‍🎓 <strong>${rows.length}명</strong></div>
    <div class="stat-chip">국어 평균 <strong>${avg('kor')}</strong></div>
    <div class="stat-chip">수학 평균 <strong>${avg('math')}</strong></div>
    <div class="stat-chip">영어 평균 <strong>${avg('eng')}</strong></div>
    <div class="stat-chip">총점 평균 <strong>${avg('total')}</strong></div>`;
  if(clsInst){clsInst.destroy();clsInst=null;}
  const wrap=document.getElementById('clsChart').parentNode;
  wrap.innerHTML='<canvas id="clsChart"></canvas>';
  const ctx=document.getElementById('clsChart').getContext('2d');
  clsInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:rows.map(d=>d.name),
      datasets:[
        {
          label:'국어',
          data:rows.map(d=>d.kor),
          borderColor:'#5b52e8',
          backgroundColor:'rgba(91,82,232,0.08)',
          borderWidth:2.5,
          pointStyle:'circle',pointRadius:5,
          pointBackgroundColor:'#5b52e8',
          tension:0.3,fill:false,spanGaps:true,
        },
        {
          label:'수학',
          data:rows.map(d=>d.math),
          borderColor:'#f04a70',
          backgroundColor:'rgba(240,74,112,0.08)',
          borderWidth:2.5,
          pointStyle:'triangle',pointRadius:6,
          pointBackgroundColor:'#f04a70',
          tension:0.3,fill:false,spanGaps:true,
        },
        {
          label:'영어',
          data:rows.map(d=>d.eng),
          borderColor:'#18b85c',
          backgroundColor:'rgba(24,184,92,0.08)',
          borderWidth:3,
          borderDash:[6,3],
          pointStyle:'rectRot',pointRadius:6,
          pointBackgroundColor:'#18b85c',
          tension:0.3,fill:false,spanGaps:true,
        },
      ]
    },
    options:chartOpts(0,110,10,false)
  });
}

function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function makeDS(label,data,color,pointStyle,borderWidth){
  return{
    label,data,
    borderColor:color,
    backgroundColor:hexToRgba(color,0.08),
    borderWidth,
    pointStyle,pointRadius:5,
    pointBackgroundColor:color,
    tension:0.3,
    fill:false,
    spanGaps:true,
  };
}

function chartOpts(yMin,yMax,yStep,showTotal){
  return{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{
        labels:{
          font:{family:'Noto Sans KR',weight:'700',size:13},
          color:'#1a1a2e',usePointStyle:true,padding:20
        }
      },
      tooltip:{
        backgroundColor:'rgba(255,255,255,0.97)',
        borderColor:'#dde0f0',borderWidth:1,
        titleColor:'#1a1a2e',bodyColor:'#1a1a2e',
        titleFont:{family:'Noto Sans KR',weight:'700',size:13},
        bodyFont:{family:'Space Mono',size:12},
        padding:12
      }
    },
    scales:{
      x:{
        ticks:{font:{family:'Noto Sans KR',weight:'700',size:11},color:'#1a1a2e',maxRotation:40},
        grid:{color:'rgba(221,224,240,0.7)'}
      },
      y:{
        min:yMin,max:yMax,
        ticks:{stepSize:yStep,font:{family:'Space Mono',size:11},color:'#8888aa'},
        grid:{color:'rgba(221,224,240,0.7)'}
      }
    }
  };
}
